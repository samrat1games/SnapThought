<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1d9bf0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SnapThought">
  <meta name="description" content="SnapThought — a modern social media platform">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/App-logo.png">
  <title>SnapThought</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/feed.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/features.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
  <script>
    // Unregister old service workers and register fresh
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
        navigator.serviceWorker.register('./sw.js?v=2.0.0').catch(() => {});
      });
    }
  </script>
</body>
</html>
